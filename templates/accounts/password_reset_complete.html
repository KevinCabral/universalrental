{% extends "layouts/base-auth.html" %}
{% load static %}

{% block title %}Senha Alterada | Universal Rent Car{% endblock title %}

{% block content %}

  <div class="auth-main">
    <div class="auth-wrapper v1">
      <div class="auth-form">
        <div class="position-relative my-5">
          <div class="auth-bg">
            <span class="r"></span>
            <span class="r s"></span>
            <span class="r s"></span>
            <span class="r"></span>
          </div>
          <div class="card mb-0">
            <form method="post" class="card-body">
              {% csrf_token %}

              <div class="text-center">
                <a href="{% url "index" %}" class="text-decoration-none">
                  <div class="d-inline-flex align-items-center justify-content-center mb-2"
                       style="width: 80px; height: 80px; border-radius: 16px;">
                    <img src="{% static 'img/driveon.png' %}" 
                         alt="Universal Rent Car" 
                         style="max-width: 55px; max-height: 55px; object-fit: contain;">
                  </div>
                  <div>
                    <h3 class="fw-bold text-primary mb-1" style="font-family: 'Inter', sans-serif; letter-spacing: -0.5px; font-size: 1.8rem;">
                      Universal Rent Car
                    </h3>
                  </div>
                </a>
              </div>
              <h4 class="text-center f-w-500 mt-4 mb-3">Senha Alterada</h4>
              <p class="mb-4">A sua senha foi alterada com sucesso.</p>
              <div class="d-flex justify-content-center gap-3 align-items-end mt-4">
                <a href="{% url "login" %}" class="link-primary">Voltar ao Login</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

{% endblock content %}
